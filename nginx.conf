server {
    listen 80;
    root /usr/share/nginx/html;

    # Proxy REST API calls to the orchestrator container.
    # The frontend uses /api as a base prefix (see App.tsx: API_BASE_URL = '/api').
    location /api/ {
        proxy_pass http://orchestrator:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routing: serve index.html for any unmatched path so client-side
    # routing works correctly.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
